  { id: "wta162_nohaakugue", name: "Noma Noha Akugue", country: "🇩🇪", tour: "WTA", rank: 162 },
  { id: "wta163_guo", name: "Guo Hanyu", country: "🇨🇳", tour: "WTA", rank: 163 },
  { id: "wta164_mandlik", name: "Elizabeth Mandlik", country: "🇺🇸", tour: "WTA", rank: 164 },
  { id: "wta165_ortenzi", name: "Jazmin Ortenzi", country: "🇦🇷", tour: "WTA", rank: 165 },
  { id: "wta166_papamichail", name: "Despina Papamichail", country: "🇬🇷", tour: "WTA", rank: 166 },

  { id: "wta168_minnen", name: "Greet Minnen", country: "🇧🇪", tour: "WTA", rank: 168 },
  { id: "wta169_bronzetti", name: "Lucia Bronzetti", country: "🇮🇹", tour: "WTA", rank: 169 },
  { id: "wta170_dart", name: "Harriet Dart", country: "🇬🇧", tour: "WTA", rank: 170 },
  { id: "wta171_sawangkaew", name: "Mananchaya Sawangkaew", country: "🇹🇭", tour: "WTA", rank: 171 },
  { id: "wta172_bassols", name: "Marina Bassols Ribera", country: "🇪🇸", tour: "WTA", rank: 172 },
  { id: "wta173_lee", name: "Carol Young Suh Lee", country: "🇲🇵", tour: "WTA", rank: 173 },
  { id: "wta174_kostovic", name: "Teodora Kostović", country: "🇷🇸", tour: "WTA", rank: 174 },
  { id: "wta175_vandromme", name: "Jeline Vandromme", country: "🇧🇪", tour: "WTA", rank: 175 },
  { id: "wta176_ponchet", name: "Jessika Ponchet", country: "🇫🇷", tour: "WTA", rank: 176 },
  { id: "wta177_monnet", name: "Carole Monnet", country: "🇫🇷", tour: "WTA", rank: 177 },
  { id: "wta178_mayexin", name: "Ma Yexin", country: "🇨🇳", tour: "WTA", rank: 178 },

  { id: "wta180_begu", name: "Irina Begu", country: "🇷🇴", tour: "WTA", rank: 180 },
  { id: "wta181_hibino", name: "Nao Hibino", country: "🇯🇵", tour: "WTA", rank: 181 },
  { id: "wta182_barthel", name: "Mona Barthel", country: "🇩🇪", tour: "WTA", rank: 182 },
  { id: "wta183_shymanovich", name: "Iryna Shymanovich", country: "🇧🇾", tour: "WTA", rank: 183 },
  { id: "wta184_giovannini", name: "Luisina Giovannini", country: "🇦🇷", tour: "WTA", rank: 184 },
  { id: "wta185_maristany", name: "Guiomar Maristany Zuleta de Reales", country: "🇪🇸", tour: "WTA", rank: 185 },
  { id: "wta186_fita", name: "Ángela Fita Boluda", country: "🇪🇸", tour: "WTA", rank: 186 },
  { id: "wta187_gjorcheska", name: "Lina Gjorčeska", country: "🇲🇰", tour: "WTA", rank: 187 },
  { id: "wta188_rame", name: "Alice Ramé", country: "🇫🇷", tour: "WTA", rank: 188 },
  { id: "wta189_osuigwe", name: "Whitney Osuigwe", country: "🇺🇸", tour: "WTA", rank: 189 },
  { id: "wta190_you", name: "You Xiaodi", country: "🇨🇳", tour: "WTA", rank: 190 },
  { id: "wta191_crawley", name: "Fiona Crawley", country: "🇺🇸", tour: "WTA", rank: 191 },
  { id: "wta192_teichmann", name: "Jil Teichmann", country: "🇨🇭", tour: "WTA", rank: 192 },
  { id: "wta193_ferro", name: "Fiona Ferro", country: "🇫🇷", tour: "WTA", rank: 193 },
  { id: "wta194_cross", name: "Kayla Cross", country: "🇨🇦", tour: "WTA", rank: 194 },
  { id: "wta195_hunter", name: "Storm Hunter", country: "🇦🇺", tour: "WTA", rank: 195 },
  { id: "wta196_gasanova", name: "Anastasia Gasanova", country: "🇷🇺", tour: "WTA", rank: 196 },
  { id: "wta197_hontama", name: "Mai Hontama", country: "🇯🇵", tour: "WTA", rank: 197 },
  { id: "wta198_niemeier", name: "Jule Niemeier", country: "🇩🇪", tour: "WTA", rank: 198 },
  { id: "wta199_jabeur", name: "Ons Jabeur", country: "🇹🇳", tour: "WTA", rank: 199 },
  { id: "wta200_podoroska", name: "Nadia Podoroska", country: "🇦🇷", tour: "WTA", rank: 200 },
];

const TOTAL = 400;
const STORAGE_KEY = "tennis-tracker-v1";
const SURFACE_COLORS = { "Hard": "#4A90D9", "Clay": "#C0622A", "Grass": "#3A8C4A", "Indoor": "#8A6DB5" };

function App() {
  const [sightings, setSightings] = useState({});
  const [filter, setFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [activeTab, setActiveTab] = useState("players");
  const fileRef = useRef();

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) setSightings(JSON.parse(stored));
    } catch(e) {}
  }, []);

  const save = (next) => {
    setSightings(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch(e) {}
  };

  const openEdit = (playerId) => {
    const existing = sightings[playerId] || {};
    setForm({
      date: existing.date || new Date().toISOString().slice(0, 10),
      location: existing.location || "",
      tournament: existing.tournament || "",
      surface: existing.surface || "Hard",
      notes: existing.notes || "",
      image: existing.image || null,
    });
    setModal({ playerId, mode: "edit" });
  };

  const openView = (playerId) => {
    if (sightings[playerId]?.seen) setModal({ playerId, mode: "view" });
    else openEdit(playerId);
  };

  const handleSave = () => {
    save({ ...sightings, [modal.playerId]: { ...form, seen: true } });
    setModal(null);
  };

  const handleUnsee = (playerId) => {
    const next = { ...sightings };
    delete next[playerId];
    save(next);
    setModal(null);
  };

  const handleImage = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(f => ({ ...f, image: ev.target.result }));
    reader.readAsDataURL(file);
  };

  const filtered = PLAYERS.filter(p => {
    if (filter !== "All" && p.tour !== filter) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const seenCount = Object.values(sightings).filter(s => s.seen).length;
  const seenPlayers = PLAYERS.filter(p => sightings[p.id]?.seen);
  const player = modal ? PLAYERS.find(p => p.id === modal.playerId) : null;

  return (
    <div style={{ background: "#0D1B2A", minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0D1B2A 0%, #1A2D42 100%)", borderBottom: "2px solid #C8A84B", padding: "20px 20px 0" }}>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 14, marginBottom: 4 }}>
          <div style={{ fontSize: 34, lineHeight: 1 }}>🎾</div>
          <div>
            <div style={{ fontSize: 10, letterSpacing: 4, color: "#C8A84B", textTransform: "uppercase", marginBottom: 2 }}>Live Sighting Tracker</div>
            <h1 style={{ margin: 0, fontSize: 22, fontFamily: "Georgia, serif", color: "#FFF", fontWeight: "bold" }}>Tennis Player Tracker</h1>
          </div>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <div style={{ fontSize: 30, fontFamily: "Georgia, serif", color: "#C8A84B", fontWeight: "bold", lineHeight: 1 }}>{seenCount}</div>
            <div style={{ fontSize: 9, color: "#8A9BB0", letterSpacing: 2, textTransform: "uppercase" }}>von {PLAYERS.length} gesehen</div>
          </div>
        </div>
        {/* Progress */}
        <div style={{ height: 3, background: "#1E3050", margin: "12px 0 0", borderRadius: 2 }}>
          <div style={{ height: 3, background: "linear-gradient(90deg, #C8A84B, #E8C96A)", width: `${(seenCount / PLAYERS.length) * 100}%`, borderRadius: 2, transition: "width 0.4s" }} />
        </div>
        {/* Tabs */}
        <div style={{ display: "flex", marginTop: 14 }}>
          {[["players","Alle Spieler"], ["log",`Gesehen (${seenCount})`]].map(([tab, label]) => (
            <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: "none", border: "none", padding: "10px 18px", cursor: "pointer", fontSize: 13, color: activeTab === tab ? "#C8A84B" : "#6A8099", borderBottom: activeTab === tab ? "2px solid #C8A84B" : "2px solid transparent", fontWeight: activeTab === tab ? "bold" : "normal" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: "18px 16px", maxWidth: 680, margin: "0 auto" }}>
        {activeTab === "players" && (
          <>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Spieler suchen…" style={{ flex: 1, minWidth: 130, background: "#142030", border: "1px solid #2A4060", borderRadius: 8, padding: "8px 12px", color: "#E8E0CC", fontSize: 13, outline: "none" }} />
              {["All","ATP","WTA"].map(f => (
                <button key={f} onClick={() => setFilter(f)} style={{ background: filter === f ? "#C8A84B" : "#142030", border: "1px solid " + (filter === f ? "#C8A84B" : "#2A4060"), borderRadius: 8, padding: "8px 16px", color: filter === f ? "#0D1B2A" : "#8A9BB0", cursor: "pointer", fontSize: 12, fontWeight: filter === f ? "bold" : "normal" }}>
                  {f}
                </button>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {filtered.map(p => {
                const seen = sightings[p.id]?.seen;
                const s = sightings[p.id];
                return (
                  <div key={p.id} onClick={() => openView(p.id)} style={{ display: "flex", alignItems: "center", gap: 10, background: seen ? "linear-gradient(135deg,#142A1E,#1A3528)" : "#142030", border: "1px solid " + (seen ? "#2A6040" : "#1E3050"), borderRadius: 10, padding: "11px 14px", cursor: "pointer", position: "relative", overflow: "hidden" }}>
                    {seen && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: "#4CAF7D", borderRadius: "10px 0 0 10px" }} />}
                    <div style={{ width: 26, textAlign: "right", fontSize: 11, color: "#3A5570", fontFamily: "monospace", flexShrink: 0 }}>{p.rank}</div>
                    <div style={{ fontSize: 18 }}>{p.country}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: "bold", color: seen ? "#90D4A8" : "#D0C8B8" }}>{p.name}</div>
                      {seen && s?.location && <div style={{ fontSize: 11, color: "#5A8A6A", marginTop: 1 }}>📍 {s.location}{s.tournament ? ` · ${s.tournament}` : ""}{s.date ? ` · ${s.date}` : ""}</div>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 9, letterSpacing: 1, color: "#4A6080", background: "#0D1B2A", padding: "3px 6px", borderRadius: 4 }}>{p.tour}</span>
                      {seen
                        ? <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#4CAF7D", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#fff" }}>✓</div>
                        : <div style={{ width: 22, height: 22, borderRadius: "50%", border: "2px dashed #2A4060" }} />}
                    </div>
                  </div>
                );
              })}
              {filtered.length === 0 && <div style={{ textAlign: "center", color: "#4A6080", padding: 32, fontSize: 14 }}>Kein Spieler gefunden.</div>}
            </div>
          </>
        )}

        {activeTab === "log" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {seenPlayers.length === 0 && (
              <div style={{ textAlign: "center", color: "#4A6080", padding: 48, fontSize: 14 }}>
                Noch keine Spieler gesehen.<br />
                <span style={{ fontSize: 12, marginTop: 6, display: "block" }}>Tippe auf einen Spieler, um dein erstes Sighting einzutragen.</span>
              </div>
            )}
            {seenPlayers.map(p => {
              const s = sightings[p.id];
              const surf = s?.surface || "Hard";
              return (
                <div key={p.id} onClick={() => openView(p.id)} style={{ background: "#142030", border: "1px solid #1E3050", borderRadius: 12, overflow: "hidden", cursor: "pointer" }}>
                  {s.image && <img src={s.image} alt="" style={{ width: "100%", height: 150, objectFit: "cover" }} />}
                  <div style={{ padding: "12px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: "bold", color: "#E8E0CC" }}>{p.country} {p.name}</div>
                        {s.tournament && <div style={{ fontSize: 12, color: "#C8A84B", marginTop: 2 }}>{s.tournament}</div>}
                      </div>
                      <span style={{ fontSize: 10, padding: "3px 9px", borderRadius: 6, background: SURFACE_COLORS[surf]+"33", color: SURFACE_COLORS[surf], border: "1px solid "+SURFACE_COLORS[surf]+"66", whiteSpace: "nowrap" }}>{surf}</span>
                    </div>
                    <div style={{ display: "flex", gap: 14, marginTop: 6, fontSize: 12, color: "#6A8099" }}>
                      {s.date && <span>📅 {s.date}</span>}
                      {s.location && <span>📍 {s.location}</span>}
                    </div>
                    {s.notes && <div style={{ marginTop: 8, fontSize: 12, color: "#8A9BB0", background: "#0D1B2A", borderRadius: 6, padding: "7px 10px", fontStyle: "italic" }}>"{s.notes}"</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Modal */}
      {modal && player && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(5,12,22,0.92)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}>
          <div style={{ background: "#0F2035", border: "1px solid #2A4060", borderRadius: 16, width: "100%", maxWidth: 420, maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ padding: "18px 18px 14px", borderBottom: "1px solid #1A3050" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, color: "#C8A84B", letterSpacing: 3, textTransform: "uppercase", marginBottom: 3 }}>{player.tour} #{player.rank} · {player.country}</div>
                  <div style={{ fontSize: 19, fontWeight: "bold", fontFamily: "Georgia, serif", color: "#FFF" }}>{player.name}</div>
                </div>
                <button onClick={() => setModal(null)} style={{ background: "#1A3050", border: "none", borderRadius: "50%", width: 30, height: 30, color: "#8A9BB0", cursor: "pointer", fontSize: 15 }}>✕</button>
              </div>
            </div>

            {modal.mode === "view" ? (
              <div style={{ padding: 18 }}>
                {sightings[modal.playerId]?.image && <img src={sightings[modal.playerId].image} alt="" style={{ width: "100%", borderRadius: 10, marginBottom: 14, maxHeight: 200, objectFit: "cover" }} />}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                  {[["📅 Datum", sightings[modal.playerId]?.date], ["📍 Ort", sightings[modal.playerId]?.location], ["🏆 Turnier", sightings[modal.playerId]?.tournament], ["🟫 Belag", sightings[modal.playerId]?.surface]].map(([label, val]) => val && (
                    <div key={label} style={{ background: "#142030", borderRadius: 8, padding: "9px 11px" }}>
                      <div style={{ fontSize: 10, color: "#4A6080", marginBottom: 3 }}>{label}</div>
                      <div style={{ fontSize: 13, color: "#D0C8B8" }}>{val}</div>
                    </div>
                  ))}
                </div>
                {sightings[modal.playerId]?.notes && (
                  <div style={{ background: "#142030", borderRadius: 8, padding: "11px 12px", marginBottom: 12 }}>
                    <div style={{ fontSize: 10, color: "#4A6080", marginBottom: 5 }}>📝 NOTIZEN</div>
                    <div style={{ fontSize: 13, color: "#D0C8B8", fontStyle: "italic" }}>{sightings[modal.playerId].notes}</div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setModal({ ...modal, mode: "edit" })} style={{ flex: 1, background: "#C8A84B", border: "none", borderRadius: 10, padding: "11px", color: "#0D1B2A", fontWeight: "bold", cursor: "pointer", fontSize: 13 }}>Bearbeiten</button>
                  <button onClick={() => handleUnsee(modal.playerId)} style={{ background: "#2A1A1A", border: "1px solid #4A2A2A", borderRadius: 10, padding: "11px 14px", color: "#C06060", cursor: "pointer", fontSize: 13 }}>Entfernen</button>
                </div>
              </div>
            ) : (
              <div style={{ padding: 18 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Datum</label>
                    <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={{ width: "100%", background: "#142030", border: "1px solid #2A4060", borderRadius: 8, padding: "9px 11px", color: "#E8E0CC", fontSize: 13, outline: "none" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Ort / Stadt</label>
                    <input value={form.location} onChange={e => setForm(f => ({ ...f, location: e.target.value }))} placeholder="z.B. Wien, Roland Garros…" style={{ width: "100%", background: "#142030", border: "1px solid #2A4060", borderRadius: 8, padding: "9px 11px", color: "#E8E0CC", fontSize: 13, outline: "none" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Turnier</label>
                    <input value={form.tournament} onChange={e => setForm(f => ({ ...f, tournament: e.target.value }))} placeholder="z.B. Wimbledon, US Open…" style={{ width: "100%", background: "#142030", border: "1px solid #2A4060", borderRadius: 8, padding: "9px 11px", color: "#E8E0CC", fontSize: 13, outline: "none" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Belag</label>
                    <div style={{ display: "flex", gap: 6 }}>
                      {Object.entries(SURFACE_COLORS).map(([surf, col]) => (
                        <button key={surf} onClick={() => setForm(f => ({ ...f, surface: surf }))} style={{ flex: 1, background: form.surface === surf ? col : "#142030", border: "1px solid "+col, borderRadius: 8, padding: "7px 2px", color: form.surface === surf ? "#fff" : col, cursor: "pointer", fontSize: 10, fontWeight: form.surface === surf ? "bold" : "normal" }}>{surf}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Notizen</label>
                    <textarea value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Wie war das Match? Besonderes erlebt?" rows={3} style={{ width: "100%", background: "#142030", border: "1px solid #2A4060", borderRadius: 8, padding: "9px 11px", color: "#E8E0CC", fontSize: 13, outline: "none", resize: "vertical", fontFamily: "inherit" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#4A6080", letterSpacing: 2, textTransform: "uppercase", display: "block", marginBottom: 5 }}>Foto</label>
                    {form.image ? (
                      <div style={{ position: "relative" }}>
                        <img src={form.image} alt="" style={{ width: "100%", borderRadius: 8, maxHeight: 150, objectFit: "cover" }} />
                        <button onClick={() => setForm(f => ({ ...f, image: null }))} style={{ position: "absolute", top: 8, right: 8, background: "rgba(13,27,42,0.85)", border: "none", borderRadius: "50%", width: 26, height: 26, color: "#E8E0CC", cursor: "pointer", fontSize: 13 }}>✕</button>
                      </div>
                    ) : (
                      <button onClick={() => fileRef.current.click()} style={{ width: "100%", background: "#142030", border: "2px dashed #2A4060", borderRadius: 8, padding: "18px", color: "#4A6080", cursor: "pointer", fontSize: 13 }}>📷 Foto hochladen</button>
                    )}
                    <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{ display: "none" }} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                  <button onClick={() => setModal(null)} style={{ flex: 1, background: "none", border: "1px solid #2A4060", borderRadius: 10, padding: "11px", color: "#6A8099", cursor: "pointer", fontSize: 13 }}>Abbrechen</button>
                  <button onClick={handleSave} style={{ flex: 2, background: "linear-gradient(135deg,#C8A84B,#E8C96A)", border: "none", borderRadius: 10, padding: "11px", color: "#0D1B2A", fontWeight: "bold", cursor: "pointer", fontSize: 14 }}>✓ Als gesehen speichern</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
